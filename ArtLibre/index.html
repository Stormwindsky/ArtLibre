<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualisateur de fichiers ZIP local</title>
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --background-color: #f8f9fa;
            --card-color: #ffffff;
            --text-color: #333333;
            --error-color: #e63946;
            --success-color: #2a9d8f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .subtitle {
            font-size: 1.1rem;
            color: #666;
        }

        .zip-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .zip-card {
            background-color: var(--card-color);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .zip-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .zip-header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px;
            font-weight: bold;
        }

        .zip-content {
            padding: 20px;
        }

        .zip-info {
            margin-bottom: 15px;
        }

        .zip-info span {
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn:hover {
            background-color: var(--secondary-color);
        }

        .btn-download {
            width: 100%;
            text-align: center;
        }

        .error-message {
            text-align: center;
            padding: 40px;
            background-color: #ffeeee;
            border-radius: 10px;
            color: var(--error-color);
            font-size: 1.2rem;
            border-left: 5px solid var(--error-color);
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top: 4px solid var(--primary-color);
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Visualisateur de fichiers ZIP</h1>
            <p class="subtitle">Liste des archives disponibles dans ce dossier</p>
        </header>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Recherche des fichiers ZIP...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>Application locale - &copy; <span id="year"></span></p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Mettre à jour l'année dans le footer
            document.getElementById('year').textContent = new Date().getFullYear();

            // Fonction pour récupérer les fichiers ZIP
            async function fetchZipFiles() {
                const contentDiv = document.getElementById('content');
                
                try {
                    // Cette méthode fonctionne seulement si le script est servi par un serveur web local
                    const response = await fetch(window.location.href);
                    const text = await response.text();
                    
                    // Analyser le HTML pour trouver les liens vers les fichiers .zip
                    const parser = new DOMParser();
                    const htmlDoc = parser.parseFromString(text, 'text/html');
                    const links = htmlDoc.querySelectorAll('a[href$=".zip"]');
                    
                    if (links.length === 0) {
                        showNoZipFiles();
                        return;
                    }
                    
                    // Créer un tableau d'objets avec les infos des fichiers ZIP
                    const zipFiles = Array.from(links).map(link => {
                        return {
                            name: link.textContent.trim(),
                            url: link.getAttribute('href'),
                            size: 'Taille inconnue' // Impossible d'obtenir la taille sans API
                        };
                    });
                    
                    displayZipFiles(zipFiles);
                } catch (error) {
                    console.error('Erreur:', error);
                    showError();
                }
            }
            
            // Afficher les fichiers ZIP
            function displayZipFiles(files) {
                const contentDiv = document.getElementById('content');
                let html = '';
                
                if (files.length === 1) {
                    html += `<p class="subtitle" style="text-align: center;">${files.length} fichier ZIP trouvé</p>`;
                } else {
                    html += `<p class="subtitle" style="text-align: center;">${files.length} fichiers ZIP trouvés</p>`;
                }
                
                html += '<div class="zip-container">';
                
                files.forEach(file => {
                    html += `
                        <div class="zip-card">
                            <div class="zip-header">
                                ${file.name}
                            </div>
                            <div class="zip-content">
                                <div class="zip-info">
                                    <span>Taille:</span> ${file.size}
                                </div>
                                <a href="${file.url}" class="btn btn-download" download>
                                    Télécharger
                                </a>
                            </div>
                        </div>
                    `;
                });
                
                html += '</div>';
                contentDiv.innerHTML = html;
            }
            
            // Afficher un message si aucun fichier ZIP n'est trouvé
            function showNoZipFiles() {
                const contentDiv = document.getElementById('content');
                contentDiv.innerHTML = `
                    <div class="error-message">
                        <h2>Aucun fichier ZIP trouvé</h2>
                        <p>Placez des fichiers .zip dans le même dossier que cette page web.</p>
                    </div>
                `;
            }
            
            // Afficher un message d'erreur
            function showError() {
                const contentDiv = document.getElementById('content');
                contentDiv.innerHTML = `
                    <div class="error-message">
                        <h2>Erreur de chargement</h2>
                        <p>Impossible de charger la liste des fichiers. Ouvrez cette page via un serveur web local (comme Live Server).</p>
                        <p style="margin-top: 20px;">
                            <a href="https://marketplace.visualstudio.com/items?itemName=ritwickdey.LiveServer" target="_blank" class="btn">
                                Installer Live Server
                            </a>
                        </p>
                    </div>
                `;
            }
            
            // Démarrer la recherche des fichiers ZIP
            fetchZipFiles();
        });
    </script>
</body>
</html>
