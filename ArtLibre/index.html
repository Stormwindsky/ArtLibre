<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index des Archives ZIP</title>
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --background-color: #f8f9fa;
            --card-color: #ffffff;
            --text-color: #333333;
            --error-color: #e63946;
            --success-color: #2a9d8f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--background-color);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #666;
            font-size: 1.1rem;
        }

        .zip-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .zip-card {
            background: var(--card-color);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .zip-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .zip-icon {
            background-color: var(--primary-color);
            color: white;
            padding: 1.5rem;
            text-align: center;
            font-size: 2.5rem;
        }

        .zip-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .zip-name {
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            word-break: break-word;
        }

        .zip-size {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .download-btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 0.6rem 1rem;
            border-radius: 5px;
            text-align: center;
            font-weight: 500;
            transition: background-color 0.3s ease;
            margin-top: auto;
        }

        .download-btn:hover {
            background-color: var(--secondary-color);
        }

        .error-message {
            text-align: center;
            padding: 2rem;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 0 auto;
        }

        .error-icon {
            font-size: 3rem;
            color: var(--error-color);
            margin-bottom: 1rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            font-size: 1.2rem;
            color: #666;
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top: 4px solid var(--primary-color);
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            color: #666;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .zip-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Index des Archives</h1>
            <p class="subtitle">Liste des fichiers ZIP disponibles dans ce dossier</p>
        </header>

        <div id="zip-container">
            <div class="loading">
                <div class="spinner"></div>
                <p>Chargement des fichiers...</p>
            </div>
        </div>

        <footer>
            <p>Généré automatiquement - &copy; <span id="current-year"></span></p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Mettre à jour l'année du footer
            document.getElementById('current-year').textContent = new Date().getFullYear();

            // Charger les fichiers ZIP
            loadZipFiles();
        });

        function loadZipFiles() {
            const container = document.getElementById('zip-container');
            
            // Simuler un délai de chargement pour l'effet visuel
            setTimeout(() => {
                fetchZipFiles()
                    .then(files => {
                        if (files.length === 0) {
                            showNoFilesError();
                        } else {
                            displayZipFiles(files);
                        }
                    })
                    .catch(error => {
                        console.error('Erreur:', error);
                        showError();
                    });
            }, 800);
        }

        function fetchZipFiles() {
            return new Promise((resolve, reject) => {
                // Dans GitHub Pages, nous ne pouvons pas scanner le dossier directement,
                // donc nous allons essayer de détecter les fichiers .zip connus
                // ou utiliser une liste prédéfinie si nécessaire.
                
                // Cette solution utilise une approche alternative car GitHub Pages ne permet pas
                // de lister les fichiers d'un dossier directement via JavaScript
                
                // Méthode 1: Si vous connaissez les noms des fichiers à l'avance
                const knownFiles = ['exemple1.zip', 'exemple2.zip']; // Remplacez par vos noms de fichiers
                const availableFiles = [];
                
                // Vérifier l'existence de chaque fichier connu
                const checks = knownFiles.map(file => {
                    return checkFileExists(file)
                        .then(exists => {
                            if (exists) {
                                availableFiles.push({
                                    name: file,
                                    size: 'N/A' // Impossible d'obtenir la taille sans serveur
                                });
                            }
                        });
                });
                
                Promise.all(checks)
                    .then(() => {
                        resolve(availableFiles);
                    })
                    .catch(() => {
                        // Si la méthode échoue, essayer de détecter dynamiquement
                        detectZipFiles()
                            .then(files => resolve(files))
                            .catch(err => reject(err));
                    });
            });
        }

        function checkFileExists(filename) {
            return fetch(filename, { method: 'HEAD' })
                .then(response => {
                    return response.ok;
                })
                .catch(() => false);
        }

        function detectZipFiles() {
            return new Promise((resolve, reject) => {
                // Cette méthode est limitée sur GitHub Pages
                // Elle ne peut pas lister les fichiers du dossier
                // Nous retournons donc un tableau vide
                resolve([]);
            });
        }

        function displayZipFiles(files) {
            const container = document.getElementById('zip-container');
            
            if (files.length === 0) {
                showNoFilesError();
                return;
            }
            
            let html = '<div class="zip-grid">';
            
            files.forEach(file => {
                html += `
                    <div class="zip-card">
                        <div class="zip-icon">
                            <i class="fas fa-file-archive">ZIP</i>
                        </div>
                        <div class="zip-content">
                            <div class="zip-name">${file.name}</div>
                            <div class="zip-size">Taille: ${file.size}</div>
                            <a href="${file.name}" class="download-btn" download>
                                Télécharger
                            </a>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }

        function showNoFilesError() {
            const container = document.getElementById('zip-container');
            container.innerHTML = `
                <div class="error-message">
                    <div class="error-icon">!</div>
                    <h2>Aucun fichier ZIP trouvé</h2>
                    <p>Il n'y a actuellement aucun fichier .zip dans ce dossier.</p>
                    <p>Veuillez ajouter des fichiers .zip dans le même répertoire que cette page.</p>
                </div>
            `;
        }

        function showError() {
            const container = document.getElementById('zip-container');
            container.innerHTML = `
                <div class="error-message">
                    <div class="error-icon">!</div>
                    <h2>Erreur de chargement</h2>
                    <p>Une erreur s'est produite lors du chargement des fichiers.</p>
                    <p>Veuillez réessayer plus tard ou vérifier la console pour plus de détails.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
